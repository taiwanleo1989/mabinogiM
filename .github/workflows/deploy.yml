name: Deploy site to GitHub Pages

# 每次 push 到 main（例如更新 site/game-data.json）就自動重新部署
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site        # 只部署 site/ 資料夾（單一資料源＋網站）
      - id: deployment
        uses: actions/deploy-pages@v4
